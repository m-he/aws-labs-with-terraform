repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
      - id: terraform_docs
        args:
          - --args=--config=__GIT_WORKING_DIR__/.terraform-docs.yml
        files: ^(modules|stacks/aws-iac)/
      - id: infracost_breakdown
        stages: [pre-push]
        files: ^modules/
        args:
          - --args=--path=./modules
        verbose: true
      - id: infracost_breakdown
        stages: [pre-push]
        files: ^stacks/aws-iac/
        args:
          - --args=--path=./stacks/aws-iac
        verbose: true
      - id: terraform_trivy
        files: ^(modules|stacks/aws-iac)/
        args:
          - --args=--quiet
          - --args=--format=table
          - --args=--severity HIGH,CRITICAL
      - id: terraform_checkov
        args:
          - --args=--quiet
          - --args=-d modules
          - --args=-d stacks/aws-iac
          - --args=--compact
          - --args=--skip-check CKV_AWS_130
          - --args=--skip-check CKV2_AWS_12
          - --args=--skip-check CKV2_AWS_11
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
